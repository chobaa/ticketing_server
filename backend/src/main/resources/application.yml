server:
  port: 8080

spring:
  application:
    name: ticketing-server
  jackson:
    serialization:
      write-dates-as-timestamps: false
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ticketing}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: ${MYSQL_USER:ticketing}
    password: ${MYSQL_PASSWORD:ticketing}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ticketing-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
      percentiles:
        "[http.server.requests]": 0.5, 0.95, 0.99

ticketing:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-long-random-string-at-least-256-bits}
    expiration-ms: 86400000
  payment:
    worker:
      concurrency: ${PAYMENT_WORKER_CONCURRENCY:8}
    simulation:
      min-delay-ms: ${PAYMENT_SIM_MIN_DELAY_MS:2000}
      max-delay-ms: ${PAYMENT_SIM_MAX_DELAY_MS:10000}
      success-rate: ${PAYMENT_SIM_SUCCESS_RATE:0.72}
  queue:
    admission-batch-size: 50
    admission-interval-ms: 1000
    token-ttl-seconds: 600
  reservation:
    hold-ttl-minutes: 10
