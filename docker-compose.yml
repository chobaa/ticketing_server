services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ticketing
      MYSQL_USER: ticketing
      MYSQL_PASSWORD: ticketing
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis Cluster (6 nodes + init). Use SPRING_PROFILES_ACTIVE=redis-cluster on backend.
  redis-node-1:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--port",
        "7000",
        "--cluster-enabled",
        "yes",
        "--cluster-config-file",
        "nodes.conf",
        "--cluster-node-timeout",
        "5000",
        "--appendonly",
        "yes",
        "--protected-mode",
        "no",
      ]
    ports: ["7000:7000"]

  redis-node-2:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--port",
        "7001",
        "--cluster-enabled",
        "yes",
        "--cluster-config-file",
        "nodes.conf",
        "--cluster-node-timeout",
        "5000",
        "--appendonly",
        "yes",
        "--protected-mode",
        "no",
      ]
    ports: ["7001:7001"]

  redis-node-3:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--port",
        "7002",
        "--cluster-enabled",
        "yes",
        "--cluster-config-file",
        "nodes.conf",
        "--cluster-node-timeout",
        "5000",
        "--appendonly",
        "yes",
        "--protected-mode",
        "no",
      ]
    ports: ["7002:7002"]

  redis-node-4:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--port",
        "7003",
        "--cluster-enabled",
        "yes",
        "--cluster-config-file",
        "nodes.conf",
        "--cluster-node-timeout",
        "5000",
        "--appendonly",
        "yes",
        "--protected-mode",
        "no",
      ]
    ports: ["7003:7003"]

  redis-node-5:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--port",
        "7004",
        "--cluster-enabled",
        "yes",
        "--cluster-config-file",
        "nodes.conf",
        "--cluster-node-timeout",
        "5000",
        "--appendonly",
        "yes",
        "--protected-mode",
        "no",
      ]
    ports: ["7004:7004"]

  redis-node-6:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--port",
        "7005",
        "--cluster-enabled",
        "yes",
        "--cluster-config-file",
        "nodes.conf",
        "--cluster-node-timeout",
        "5000",
        "--appendonly",
        "yes",
        "--protected-mode",
        "no",
      ]
    ports: ["7005:7005"]

  redis-cluster-init:
    image: redis:7-alpine
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        sleep 2;
        echo 'creating redis cluster (idempotent)...';
        redis-cli --cluster create
          redis-node-1:7000 redis-node-2:7001 redis-node-3:7002
          redis-node-4:7003 redis-node-5:7004 redis-node-6:7005
          --cluster-replicas 1 --cluster-yes || true;
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
      redis-node-1:
        condition: service_started
      redis-node-2:
        condition: service_started
      redis-node-3:
        condition: service_started
      redis-node-4:
        condition: service_started
      redis-node-5:
        condition: service_started
      redis-node-6:
        condition: service_started
      kafka:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ticketing
      MYSQL_USER: ticketing
      MYSQL_PASSWORD: ticketing
      SPRING_PROFILES_ACTIVE: redis-cluster
      REDIS_CLUSTER_NODES: redis-node-1:7000,redis-node-2:7001,redis-node-3:7002,redis-node-4:7003,redis-node-5:7004,redis-node-6:7005
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: docker-dev-change-me-use-long-secret-string-32chars-min
      NGRINDER_BASE_URL: http://controller
      NGRINDER_USERNAME: admin
      NGRINDER_PASSWORD: admin
      TICKETING_NGRINDER_TARGET_BASE_URL: http://host.docker.internal:8080
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_IP_REQUESTS: "10000"
      RATE_LIMIT_IP_WINDOW_MS: "1000"
      RATE_LIMIT_USER_REQUESTS: "10000"
      RATE_LIMIT_USER_WINDOW_MS: "1000"
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.5.2
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"

  # nGrinder controller + agent (load test generator)
  controller:
    image: ngrinder/controller:latest
    ports:
      - "9080:80"
      - "16001:16001"
      - "9010-9019:9010-9019"
      - "12000-12009:12000-12009"
    environment:
      TZ: Asia/Seoul
    volumes:
      - ngrinder_controller_data:/opt/ngrinder-controller

  agent:
    image: ngrinder/agent:latest
    depends_on:
      - controller
    environment:
      TZ: Asia/Seoul
    # If you want more load, scale this service:
    # docker compose up -d --scale agent=3

volumes:
  mysql_data:
  grafana_data:
  ngrinder_controller_data:
