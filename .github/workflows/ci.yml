name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test
        run: ./mvnw -q test

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & start stack
        run: docker compose up -d --build

      - name: Wait for backend health
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if curl -fsS "http://localhost:8080/actuator/health" >/dev/null; then
              echo "backend ok"
              exit 0
            fi
            sleep 2
          done
          echo "backend health timeout"
          docker compose ps
          docker compose logs --no-color --tail=200 backend
          exit 1

      - name: Smoke endpoints
        run: |
          set -euo pipefail
          curl -fsS "http://localhost:9090/-/ready" >/dev/null
          curl -fsS "http://localhost:3000/api/health" >/dev/null
          curl -fsS "http://localhost:8080/api/dashboard/status" >/dev/null

      - name: Shutdown
        if: always()
        run: docker compose down -v

