server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS resolver (re-resolve service names at runtime)
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $backend_upstream backend:8080;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /actuator/ {
        set $backend_upstream backend:8080;
        proxy_pass http://$backend_upstream;
    }

    location /ws/ {
        set $backend_upstream backend:8080;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Grafana under subpath (/grafana)
    location /grafana/ {
        # IMPORTANT: keep the /grafana prefix in upstream request.
        # If we strip it (proxy_pass .../), Grafana (serve_from_sub_path) redirects back to /grafana/* and loops (301).
        # Use variable + Docker resolver so service IP changes don't cause 502.
        set $grafana_upstream grafana:3000;
        proxy_pass http://$grafana_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /grafana;
    }
}
